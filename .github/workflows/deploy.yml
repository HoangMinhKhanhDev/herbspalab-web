name: 🚀 Deploy HerbSpaLab to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch: # Chạy thủ công từ GitHub → Actions → Run workflow

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      # ─────────────────────────────────────────────
      # 1. Checkout source code
      # ─────────────────────────────────────────────
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      # ─────────────────────────────────────────────
      # 2. Setup Node.js 20
      # ─────────────────────────────────────────────
      - name: ⚙️ Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            frontend/package-lock.json
            backend/package-lock.json

      # ─────────────────────────────────────────────
      # 3. Build Frontend (React + Vite)
      # ─────────────────────────────────────────────
      - name: 📦 Build Frontend
        run: |
          cd frontend
          npm install
          npm run build
          echo "✅ Frontend: $(du -sh dist/ | cut -f1)"

      # ─────────────────────────────────────────────
      # 4. Build Backend (TypeScript → JS + Prisma)
      # ─────────────────────────────────────────────
      - name: 🔧 Build Backend
        run: |
          cd backend
          npm install
          npm run build
          echo "✅ Backend build done"

      # ─────────────────────────────────────────────
      # 5. Gộp tất cả vào build/
      # ─────────────────────────────────────────────
      - name: 🗜️ Consolidate build outputs
        run: |
          node scripts/consolidate-build.js
          ls -la build/
          ls -la build/server/

      # ─────────────────────────────────────────────
      # 6. Tạo .env production từ GitHub Secrets
      # ─────────────────────────────────────────────
      - name: 🔐 Create production .env
        run: |
          printf 'PORT=3000\nNODE_ENV=production\nJWT_SECRET=%s\nDATABASE_URL=%s\nCORS_ORIGIN=%s\nSTRIPE_SECRET_KEY=%s\n' \
            "${{ secrets.JWT_SECRET }}" \
            "${{ secrets.DATABASE_URL }}" \
            "${{ secrets.CORS_ORIGIN }}" \
            "${{ secrets.STRIPE_SECRET_KEY }}" \
            > build/.env
          echo "✅ .env created"

      # ─────────────────────────────────────────────
      # 7. Upload lên Hostinger qua FTP
      #    Chỉ cần 3 biến: FTP_SERVER, FTP_USERNAME, FTP_PASSWORD
      #    Lấy từ hPanel → FTP Accounts
      # ─────────────────────────────────────────────
      - name: 🚀 Upload to Hostinger via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          protocol: ftps
          local-dir: build/
          server-dir: public_html/
          # Không xóa uploads/ và database trên server
          exclude: |
            **/uploads/**
            **/server/prisma/*.db
            **/server/prisma/*.db-journal
            **/server/prisma/*.db-wal
          timeout: 60000
          log-level: standard

      # ─────────────────────────────────────────────
      # 8. Post-deploy: npm install + prisma + restart
      #    (Chỉ chạy nếu có SSH_PRIVATE_KEY trong Secrets)
      #    Bỏ qua bước này nếu chưa cấu hình SSH
      # ─────────────────────────────────────────────
      - name: 🔄 Post-deploy on server (SSH)
        if: ${{ secrets.SSH_PRIVATE_KEY != '' }}
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT || '65002' }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$SSH_PORT" -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          ssh -i ~/.ssh/deploy_key \
            -p "$SSH_PORT" \
            -o StrictHostKeyChecking=no \
            "$SSH_USER@$SSH_HOST" << 'ENDSSH'
            set -e
            cd ~/public_html/server
            echo "📦 npm install..."
            npm install --omit=dev --prefer-offline
            echo "🔄 prisma generate..."
            npx prisma generate
            echo "🗄️ prisma migrate..."
            npx prisma migrate deploy
            echo "✅ Post-deploy done!"
          ENDSSH

      # ─────────────────────────────────────────────
      # 9. Kết quả
      # ─────────────────────────────────────────────
      - name: ✅ Deploy thành công!
        if: success()
        run: |
          echo "🎉 ========================"
          echo "   DEPLOY THÀNH CÔNG!"
          echo "========================"
          echo "Branch : ${{ github.ref_name }}"
          echo "Commit : ${{ github.sha }}"

      - name: ❌ Deploy thất bại
        if: failure()
        run: echo "💥 Thất bại! Xem log ở trên."
