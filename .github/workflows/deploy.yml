name: 🚀 Deploy HerbSpaLab to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch: # Chạy thủ công từ GitHub → Actions → Run workflow

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      # ─────────────────────────────────────────────
      # 1. Checkout source code
      # ─────────────────────────────────────────────
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      # ─────────────────────────────────────────────
      # 2. Setup Node.js 20
      # ─────────────────────────────────────────────
      - name: ⚙️ Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            frontend/package-lock.json
            backend/package-lock.json

      # ─────────────────────────────────────────────
      # 3. Build Frontend (React + Vite)
      # ─────────────────────────────────────────────
      - name: 📦 Build Frontend
        run: |
          cd frontend
          npm ci
          npm run build
          echo "✅ Frontend: $(du -sh dist/ | cut -f1)"

      # ─────────────────────────────────────────────
      # 4. Build Backend (TypeScript → JS + Prisma)
      # ─────────────────────────────────────────────
      - name: 🔧 Build Backend
        run: |
          cd backend
          npm ci
          npm run build
          echo "✅ Backend build done"

      # ─────────────────────────────────────────────
      # 5. Gộp tất cả vào build/
      # ─────────────────────────────────────────────
      - name: 🗜️ Consolidate build outputs
        run: |
          node scripts/consolidate-build.js
          ls -la build/
          ls -la build/server/

      # ─────────────────────────────────────────────
      # 6. Tạo .env production từ GitHub Secrets
      # ─────────────────────────────────────────────
      - name: 🔐 Create production .env
        run: |
          cat > build/.env <<EOF
          NODE_ENV=production
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          CORS_ORIGIN=${{ secrets.CORS_ORIGIN }}
          FRONTEND_URL=${{ secrets.FRONTEND_URL }}
          DOMAIN=${{ secrets.DOMAIN }}
          STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET=${{ secrets.STRIPE_WEBHOOK_SECRET }}
          MAIL_HOST=${{ secrets.MAIL_HOST }}
          MAIL_PORT=${{ secrets.MAIL_PORT }}
          MAIL_USER=${{ secrets.MAIL_USER }}
          MAIL_PASS=${{ secrets.MAIL_PASS }}
          EOF
          echo "✅ .env created (PORT omitted: Hostinger Passenger assigns it dynamically)"

      # ─────────────────────────────────────────────
      # 7. Upload lên Hostinger qua FTP
      #    Chỉ cần 3 biến: FTP_SERVER, FTP_USERNAME, FTP_PASSWORD
      #    Lấy từ hPanel → FTP Accounts
      # ─────────────────────────────────────────────
      - name: 🚀 Upload to Hostinger via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          protocol: ftps
          local-dir: build/
          server-dir: domains/herbspalab.com/public_html/
          # Không xóa user uploads & database trên server.
          # Lưu ý: KHÔNG exclude toàn bộ uploads/** vì local build có .gitkeep
          # giúp tạo thư mục lần đầu. Chỉ exclude file đã upload.
          exclude: |
            **/server/prisma/*.db
            **/server/prisma/*.db-journal
            **/server/prisma/*.db-wal
            **/server/prisma/*.sqlite
            **/server/prisma/*.sqlite3
            **/.git/**
            **/.github/**
          timeout: 60000
          log-level: standard

      # ─────────────────────────────────────────────
      # 8. Post-deploy: npm install + prisma + restart
      #    (Chỉ chạy nếu có SSH_PRIVATE_KEY trong Secrets)
      #    Bỏ qua bước này nếu chưa cấu hình SSH
      # ─────────────────────────────────────────────
      - name: 🔄 Post-deploy on server (SSH)
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT || '65002' }}
        run: |
          if [ -z "$SSH_PRIVATE_KEY" ]; then
            echo "Bỏ qua bước chạy lệnh trên Server (Vì chưa cấu hình SSH_PRIVATE_KEY)."
            exit 0
          fi
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$SSH_PORT" -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          ssh -i ~/.ssh/deploy_key \
            -p "$SSH_PORT" \
            -o StrictHostKeyChecking=no \
            "$SSH_USER@$SSH_HOST" << 'ENDSSH'
            set -e
            cd ~/domains/herbspalab.com/public_html
            echo "📁 Ensure uploads dir exists..."
            mkdir -p uploads && chmod 755 uploads
            cd server
            echo "📦 npm install..."
            npm install --omit=dev --prefer-offline --no-audit --no-fund
            echo "🔄 prisma generate..."
            npx prisma generate
            echo "🗄️ prisma db push (sync schema to SQLite)..."
            npx prisma db push --skip-generate --accept-data-loss
            echo "🔁 Restart Node app (touch restart.txt for Passenger)..."
            mkdir -p tmp && touch tmp/restart.txt
            echo "✅ Post-deploy done!"
          ENDSSH

      # ─────────────────────────────────────────────
      # 9. Kết quả
      # ─────────────────────────────────────────────
      - name: ✅ Deploy thành công!
        if: success()
        run: |
          echo "🎉 ========================"
          echo "   DEPLOY THÀNH CÔNG!"
          echo "========================"
          echo "Branch : ${{ github.ref_name }}"
          echo "Commit : ${{ github.sha }}"

      - name: ❌ Deploy thất bại
        if: failure()
        run: echo "💥 Thất bại! Xem log ở trên."
