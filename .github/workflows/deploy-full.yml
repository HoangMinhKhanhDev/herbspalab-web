name: Deploy HerbSpaLab to Hostinger (Unified) [DISABLED - using Hostinger auto-deploy]

on:
  workflow_dispatch:
    # Disabled: Hostinger auto-deploys from GitHub directly
    # Re-enable by changing to: push: branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 1. Build React Frontend
      - name: Install & Build Frontend
        run: |
          cd frontend
          npm ci
          npm run build

      # 2. Install & Build Backend (Prisma + TS)
      - name: Install & Build Backend
        run: |
          cd backend
          npm ci
          npm run build
          # Verify dist directory was created
          if [ ! -d "dist" ]; then
            echo "ERROR: backend/dist directory not found after build"
            echo "Current directory contents:"
            ls -la
            echo "Checking if dist exists anywhere:"
            find . -name "dist" -type d 2>/dev/null || echo "No dist directory found"
            exit 1
          fi
          echo "Backend build successful, dist directory exists"
          echo "Dist directory contents:"
          ls -la dist/

      # 3. Consolidate build outputs
      - name: Consolidate Build Outputs
        run: |
          node scripts/consolidate-build.js
          # Verify build directory was created
          if [ ! -d "build" ]; then
            echo "ERROR: build directory not found after consolidation"
            ls -la
            exit 1
          fi
          echo "Build directory contents:"
          ls -la build/

      # 4. Deploy to Hostinger via FTP
      - name: Upload to Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          # Deploy from consolidated build directory
          local-dir: build/
          server-dir: public_html/
