name: Deploy Web (Backend + Frontend) to Hostinger [DISABLED - web/ dir removed]

on:
  workflow_dispatch:
    # Disabled: web/ directory no longer exists in this repo

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # ─── Upload Backend (server.js, package.json, prisma, utils) ───
      - name: Deploy Backend files via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: web/backend/
          server-dir: web/backend/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.env
            **/logs/**
            **/uploads/**
            **/dev.db
            **/dev.db-journal
            **/dev.db-wal
            **/dev.db-shm
            **/check*.js
            **/test*.js
            **/seed*.js
            **/update_slugs.js
            **/seed_verify.js
            **/category_seed.js

      # ─── Upload Frontend (static HTML/CSS/JS) ───
      - name: Deploy Frontend static files via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: web/frontend/
          server-dir: web/frontend/
          exclude: |
            **/.git*
            **/uploads/**
